<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Portfolio - orgkamolbek</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #050810;
            overflow: hidden;
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Fazodagi yulduzlar */
        .stars {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: transparent;
            z-index: 0;
        }

        .system-container {
            position: relative;
            width: 600px;
            height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Markaziy Quyosh (Avatar) */
        .sun {
            position: absolute;
            width: 100px; height: 100px;
            /* Rasm manzilingizni to'g'ri ekanligini tekshiring */
            background: url('C:/Users/delux/Downloads/kamolbek_avatar.jpg') center/cover;
            border-radius: 50%;
            border: 4px solid #ffcc00;
            box-shadow: 0 0 50px #ffcc00;
            z-index: 10;
        }

        .orbit {
            position: absolute;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
        }

        /* Aylanish animatsiyalari */
        .orbit-1 { width: 250px; height: 250px; animation: rotate 10s linear infinite; }
        .orbit-2 { width: 400px; height: 400px; animation: rotate 20s linear infinite; }
        .orbit-3 { width: 550px; height: 550px; animation: rotate 35s linear infinite; }

        .planet {
            position: absolute;
            top: -15px;
            width: 40px; height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
        }

        .p1 { background: #4db8ff; box-shadow: 0 0 15px #4db8ff; }
        .p2 { background: #ff4d4d; box-shadow: 0 0 15px #ff4d4d; }
        .p3 { background: #9966ff; box-shadow: 0 0 15px #9966ff; }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .info-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="system-container">
        <div class="sun" title="Orgkamolbek"></div>

        <div class="orbit orbit-1">
            <div class="planet p1">HTML</div>
        </div>

        <div class="orbit orbit-2">
            <div class="planet p2">CSS</div>
        </div>

        <div class="orbit orbit-3">
            <div class="planet p3">Python</div>
        </div>
    </div>

    <div class="info-box">
        <h3 style="margin: 0 0 10px 0; color: #ffcc00;">Cosmic Portfolio</h3>
        <p style="margin: 0; font-size: 14px; opacity: 0.8;">Planetalar ustiga bosing<br>loyihalarni kashf qiling.</p>
    </div>

</body>
</html>
